<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리스트</title>
</head>
<body>
    <h1>리스트태그</h1>
    <h2>비순서형 리스트 - ul</h2>
    <p>리스트태그 사이의 문맥적인 순서의 흐름이 없는 경우 사용</p>
    <ul>
        <li>고양이</li>
        <li>강아지</li>
        <li>족제비</li>
    </ul>

    <h2>순서형 리스트 - ol</h2>
    <p>리스트태그 사이에 문맥적인 순서의 흐름이 있는 경우 사용</p>
    <ol>
        <li>물을 끓인다</li>
        <li>스프를 넣는다.</li>
        <li>면을 넣는다.</li>
    </ol>

    

</body>
</html>
